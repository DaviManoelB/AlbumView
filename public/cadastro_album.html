<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AlbumView</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="assets/css/styles.css">
    </head>
    <body>

    <header class="cabecalho container">
        <div class="logo text-center">
            <a href="index.html"><h1>AlbumView</h1></a>
        </div>

        <div class="interacao row align-items-center mt-3">

            <form id="form" class="col-12 col-md-6 d-flex flex-column flex-md-row gap-2">
                <input id="formNome" class="form-control" type="text" name="album" placeholder="Nome do álbum" required>
                <!-- <input class="form-control" type="text" name="artista" placeholder="Nome do artista" required> -->
                <button class="btn" onclick="pesquisarAlbum()">Pesquisar</button>
            </form>

            <nav class="navegacao col-12 col-md-6 text-md-end mt-3 mt-md-0">
                <div class="botoes">
                    <!-- <a href="#"><button class="btn m-1">Artista Aleatório</button></a>s -->
                    <button class="btn m-1" onclick ="abrirAlbumAleatorio()">Álbum Aleatório</button>
                    <a href="cadastro_album.html"><button class="btn m-1">Gerenciar Álbuns</button></a>
                    <!-- <a href="#"><button class="btn m-1">Artistas</button></a> -->
                </div>
            </nav>

        </div>
    </header>

    <main class="container my-5">
        <section class="crud-album">

            <h2 class="mb-4 text-center">Gerenciamento de Álbuns</h2>
            <div class="cardCrud p-4 mb-5">

                <h3 id="tituloFormulario">Cadastrar Álbum</h3>
                <form id="formCadastro">
                    <input type="hidden" id="albumId">
                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" id="nomeAlbum" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Artista</label>
                            <input type="text" id="artistaAlbum" class="form-control" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Ano</label>
                            <input type="number" id="anoAlbum" class="form-control" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Gênero</label>
                            <input type="text" id="generoAlbum" class="form-control" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Número de Faixas</label>
                            <input type="number" id="numMusicaAlbum" class="form-control" required>
                        </div>

                        <div class="col-12 mb-3">
                            <label class="form-label">URL da Capa</label>
                            <input type="text" id="capaAlbum" class="form-control" required>
                        </div>

                        <div class="col-12 mb-3">
                            <label class="form-label">Músicas</label>
                            <textarea
                                id="musicasAlbum"
                                class="form-control"
                                rows="3"
                                placeholder="Digite as músicas separadas por ;&#10;Exemplo: Thriller; Beat It; Billie Jean"
                                required></textarea>
                        </div>

                    </div>

                    <button type="submit" class="btn">
                        Salvar Álbum
                    </button>

                    <button
                        type="button"
                        class="btn btn-secondary"
                        onclick="limparFormulario()">
                        Cancelar
                    </button>
                </form>
            </div>

            <h3 class="mb-3">Álbuns Cadastrados</h3>

            <div class="table-responsive">

                <table class="table tabelaCrud">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Artista</th>
                            <th>Ano</th>
                            <th>Gênero</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="tabelaAlbums">
                    </tbody>

                </table>

            </div>

        </section>

    </main>


    <footer class="footer text-center my-4">
        <h3>AlbumView Copyright 2026 DaviManoelB</h3>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/scripts/app.js"></script>

    </body>
</html>
