<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbumView</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
     <header class="cabecalho container">
        <div class="logo text-center">
            <a href="index.html"><h1>AlbumView</h1></a>
        </div>

        <div class="interacao row align-items-center mt-3">

            <form id="form" class="col-12 col-md-6 d-flex flex-column flex-md-row gap-2">
                <input id="formNome" class="form-control" type="text" name="album" placeholder="Nome do álbum" required>
                <!-- <input class="form-control" type="text" name="artista" placeholder="Nome do artista" required> -->
                <button class="btn" onclick="pesquisarAlbum()">Pesquisar</button>
            </form>

            <nav class="navegacao col-12 col-md-6 text-md-end mt-3 mt-md-0">
                <div class="botoes">
                    <!-- <a href="#"><button class="btn m-1">Artista Aleatório</button></a> -->
                    <button class="btn m-1" onclick ="abrirAlbumAleatorio()">Álbum Aleatório</button>
                    <!-- <a href="#"><button class="btn m-1">Gêneros</button></a> -->
                    <!-- <a href="#"><button class="btn m-1">Artistas</button></a> -->
                </div>
            </nav>

        </div>
    </header>

    <main class="main container my-5">
        <section class="detalhes-album row g-4">
            <div class="col-12 col-lg-5">
                <div class="cardDetalhes shadow-sm p-4 h-100">
                    <img id="detalhes-capa" src="" class="img-fluid rounded mb-4" alt="Capa do álbum">
                    <h2 id="detalhes-nome" class="mb-3">Nome do Álbum</h2>
                    <p class="mb-2"><strong>Artista:</strong> <span id="detalhes-artista">Nome do artista</span></p>
                    <p class="mb-2"><strong>Ano:</strong> <span id="detalhes-ano">2026</span></p>
                    <p class="mb-2"><strong>Gênero:</strong> <span id="detalhes-genero">Gênero</span></p>
                    <p class="mb-0"><strong>Total de músicas:</strong> <span id="detalhes-numMusica">0</span></p>
                    <a href="index.html" class="btn btn-secondary mt-4">Voltar</a>
                </div>
            </div>
            <div class="col-12 col-lg-7">
                <div class="cardDetalhes shadow-sm p-4 h-100">
                    <h3 class="mb-3">Faixas</h3>
                    <ul id="detalhes-musicas" class="list-group list-group-flush">
                        <li class="list-group-item">Carregando músicas...</li>
                    </ul>
                </div>
            </div>
        </section>

        <section class = "artista row justify-content-around align-items-center">
            <div class="sobreArt col-6 col-md-4 justify-content-start">
                <img id="fotoArtista" src="" class="fotoArt img-fluid rounded" alt="Foto do artista">
            </div>
            <h4 id="descricaoArtista" class="descricao col-6 col-md-4">Sobre o artista</h4>

        </section>
    </main>

    <footer class="footer text-center my-4">
        <h3>AlbumView Copyright 2026 
            <a href="https://github.com/DaviManoelB" target="_blank">DaviManoelB</a>
        </h3>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
